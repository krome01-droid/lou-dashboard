# ============================================
# Nginx — agent.autoecolemagazine.fr
# À placer sur le VPS dans :
#   /etc/nginx/sites-available/agent.autoecolemagazine.fr
# puis : ln -s /etc/nginx/sites-available/agent.autoecolemagazine.fr \
#               /etc/nginx/sites-enabled/
# Obtenir le SSL avec : certbot --nginx -d agent.autoecolemagazine.fr
# ============================================

server {
    listen 80;
    server_name agent.autoecolemagazine.fr;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name agent.autoecolemagazine.fr;

    # SSL (géré par Certbot)
    ssl_certificate     /etc/letsencrypt/live/agent.autoecolemagazine.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/agent.autoecolemagazine.fr/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Sécurité
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # -----------------------------------------------
    # Dashboard Lou (Next.js) — /admin-lou/*
    # -----------------------------------------------
    location /admin-lou {
        proxy_pass         http://127.0.0.1:3847;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # SSE (streaming réponses IA)
        proxy_read_timeout         300s;
        proxy_buffering            off;
        proxy_cache                off;
    }

    # -----------------------------------------------
    # Chatbot Leo (PHP) — racine + /api/* + /widget/*
    # -----------------------------------------------
    root /var/www/agent.autoecolemagazine.fr;
    index index.php;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include        fastcgi_params;
        fastcgi_pass   unix:/run/php/php8.2-fpm.sock;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    location ~ /\.ht {
        deny all;
    }
}
